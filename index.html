<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Vòng Tròn Đơn Vị — Intuition Engine</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a0e;
      color: #e4e4e7;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      -webkit-user-select: none;
      user-select: none;
      overflow: hidden;
    }

    /* Challenge banner */
    .challenge {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 10;
      text-align: center;
      padding: 16px 20px;
      background: rgba(10,10,14,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid #1e1e24;
      transition: all 0.4s ease;
    }
    .challenge h2 {
      font-size: 1.15rem;
      font-weight: 700;
      color: #fbbf24;
      margin-bottom: 4px;
      transition: all 0.3s;
    }
    .challenge p {
      font-size: 0.82rem;
      color: #71717a;
      max-width: 400px;
      margin: 0 auto;
      line-height: 1.4;
    }
    .challenge.celebrate h2 { color: #34d399; }
    .challenge.celebrate p { color: #a1a1aa; }

    /* SVG */
    .canvas-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      max-width: 500px;
      padding-top: 100px;
    }
    svg#circle {
      width: 90vw;
      height: 90vw;
      max-width: 440px;
      max-height: 440px;
      touch-action: none;
      cursor: grab;
    }
    svg#circle:active { cursor: grabbing; }

    /* Value readout */
    .readout {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 16px;
      padding: 10px 20px;
      background: rgba(24,24,28,0.95);
      backdrop-filter: blur(12px);
      border: 1px solid #27272a;
      border-radius: 12px;
      font-size: 0.9rem;
      opacity: 0;
      transition: opacity 0.5s ease, transform 0.5s ease;
      transform: translateX(-50%) translateY(10px);
      white-space: nowrap;
    }
    .readout.visible {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
    .readout .val {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .readout .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      display: inline-block;
    }
    .readout .v-val {
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-weight: 700;
      font-size: 1rem;
      min-width: 52px;
      text-align: right;
    }
    .readout .angle-val {
      color: #71717a;
      font-size: 0.8rem;
      margin-left: 8px;
      padding-left: 12px;
      border-left: 1px solid #27272a;
    }

    /* Next button */
    .next-btn {
      display: none;
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      background: #a78bfa;
      color: #0a0a0e;
      font-weight: 700;
      font-size: 0.95rem;
      border: none;
      padding: 12px 32px;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s;
      animation: pulse 2s ease-in-out infinite;
    }
    .next-btn:hover { background: #c4b5fd; transform: translateX(-50%) scale(1.05); }
    .next-btn.show { display: block; }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(167,139,250,0.4); }
      50% { box-shadow: 0 0 0 12px rgba(167,139,250,0); }
    }

    /* Phase indicator dots */
    .phase-dots {
      position: fixed;
      top: 110px;
      right: 20px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .phase-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #27272a;
      transition: all 0.3s;
    }
    .phase-dot.active { background: #a78bfa; box-shadow: 0 0 8px #a78bfa80; }
    .phase-dot.done { background: #34d399; }

    /* Celebration overlay */
    .celeb {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(10,10,14,0.7);
      backdrop-filter: blur(4px);
      z-index: 20;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.5s;
    }
    .celeb.show { opacity: 1; pointer-events: auto; }
    .celeb-card {
      background: #18181b;
      border: 1px solid #27272a;
      border-radius: 16px;
      padding: 32px 28px;
      max-width: 340px;
      text-align: center;
      transform: scale(0.9);
      transition: transform 0.4s ease;
    }
    .celeb.show .celeb-card { transform: scale(1); }
    .celeb-card .emoji { font-size: 2.5rem; margin-bottom: 12px; }
    .celeb-card h3 { color: #34d399; font-size: 1.2rem; margin-bottom: 8px; }
    .celeb-card p { color: #a1a1aa; font-size: 0.85rem; line-height: 1.6; }
    .celeb-card button {
      margin-top: 16px;
      background: #a78bfa;
      color: #0a0a0e;
      font-weight: 600;
      border: none;
      padding: 10px 24px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
    }

    @media (max-width: 500px) {
      .challenge h2 { font-size: 1rem; }
      .challenge p { font-size: 0.75rem; }
      .readout { font-size: 0.8rem; gap: 10px; padding: 8px 14px; }
      .phase-dots { right: 12px; top: 90px; }
      .celeb-card { margin: 0 16px; padding: 24px 20px; }
    }
  </style>
</head>
<body>

<!-- Challenge Banner -->
<div class="challenge" id="challenge">
  <h2 id="ch-title">🎯 Thử thách 1</h2>
  <p id="ch-desc">Kéo điểm màu tím lên vị trí CAO NHẤT có thể</p>
</div>

<!-- Phase dots -->
<div class="phase-dots">
  <div class="phase-dot active" id="pd0"></div>
  <div class="phase-dot" id="pd1"></div>
  <div class="phase-dot" id="pd2"></div>
  <div class="phase-dot" id="pd3"></div>
</div>

<!-- SVG Canvas -->
<div class="canvas-wrap">
  <svg id="circle" viewBox="-1.5 -1.5 3 3" xmlns="http://www.w3.org/2000/svg">
    <!-- Axes -->
    <line x1="-1.3" y1="0" x2="1.3" y2="0" stroke="#27272a" stroke-width="0.01"/>
    <line x1="0" y1="-1.3" x2="0" y2="1.3" stroke="#27272a" stroke-width="0.01"/>

    <!-- Unit circle -->
    <circle cx="0" cy="0" r="1" fill="none" stroke="#3f3f46" stroke-width="0.015"/>

    <!-- sin projection line (hidden in phase 0) -->
    <line id="sin-line" stroke="#f87171" stroke-width="0.03" stroke-linecap="round" opacity="0"/>

    <!-- cos projection line (hidden until phase 2) -->
    <line id="cos-line" stroke="#60a5fa" stroke-width="0.03" stroke-linecap="round" opacity="0"/>

    <!-- Radius line -->
    <line id="radius" stroke="#a1a1aa" stroke-width="0.012" opacity="0.4"/>

    <!-- Draggable point -->
    <circle id="point" cx="1" cy="0" r="0.08" fill="#a78bfa" style="cursor:grab;">
      <animate attributeName="r" values="0.08;0.1;0.08" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle id="point-glow" cx="1" cy="0" r="0.14" fill="none" stroke="#a78bfa40" stroke-width="0.02">
      <animate attributeName="r" values="0.14;0.18;0.14" dur="2s" repeatCount="indefinite"/>
    </circle>

    <!-- Angle arc -->
    <path id="arc" fill="none" stroke="#fbbf24" stroke-width="0.02" opacity="0"/>

    <!-- Labels -->
    <text id="sin-tick" x="1.08" y="0" fill="#f87171" font-size="0.08" font-weight="600" opacity="0">1</text>
    <text id="cos-tick" x="0" y="-1.08" fill="#60a5fa" font-size="0.08" font-weight="600" opacity="0">1</text>
    <text id="val-label" x="0" y="0" fill="#ffffff" font-size="0.12" font-weight="700" text-anchor="middle" opacity="0"></text>
  </svg>
</div>

<!-- Readout -->
<div class="readout" id="readout">
  <div class="val">
    <span class="dot" style="background:#f87171;" id="dot-sin"></span>
    <span>sin</span>
    <span class="v-val" style="color:#f87171;" id="rv-sin">0.00</span>
  </div>
  <div class="val" id="cos-val-wrap">
    <span class="dot" style="background:#60a5fa;" id="dot-cos"></span>
    <span>cos</span>
    <span class="v-val" style="color:#60a5fa;" id="rv-cos">1.00</span>
  </div>
  <span class="angle-val" id="rv-angle">0°</span>
</div>

<!-- Next button -->
<button class="next-btn" id="next-btn" onclick="nextPhase()">Tiếp tục ▸</button>

<!-- Celebration card -->
<div class="celeb" id="celeb">
  <div class="celeb-card">
    <div class="emoji" id="celeb-emoji">🎉</div>
    <h3 id="celeb-title">Quá đúng!</h3>
    <p id="celeb-text"></p>
    <button onclick="dismissCeleb(); nextPhase();">Tiếp tục ▸</button>
  </div>
</div>

<script>
(function() {
  'use strict';

  // === Elements ===
  const svg = document.getElementById('circle');
  const point = document.getElementById('point');
  const pointGlow = document.getElementById('point-glow');
  const radius = document.getElementById('radius');
  const sinLine = document.getElementById('sin-line');
  const cosLine = document.getElementById('cos-line');
  const arc = document.getElementById('arc');
  const sinTick = document.getElementById('sin-tick');
  const cosTick = document.getElementById('cos-tick');
  const valLabel = document.getElementById('val-label');

  const readout = document.getElementById('readout');
  const rvSin = document.getElementById('rv-sin');
  const rvCos = document.getElementById('rv-cos');
  const rvAngle = document.getElementById('rv-angle');
  const cosValWrap = document.getElementById('cos-val-wrap');
  const dotSin = document.getElementById('dot-sin');
  const dotCos = document.getElementById('dot-cos');
  const nextBtn = document.getElementById('next-btn');

  const chTitle = document.getElementById('ch-title');
  const chDesc = document.getElementById('ch-desc');
  const challenge = document.getElementById('challenge');

  const celeb = document.getElementById('celeb');
  const celebEmoji = document.getElementById('celeb-emoji');
  const celebTitle = document.getElementById('celeb-title');
  const celebText = document.getElementById('celeb-text');

  // === State ===
  let angle = 0;
  let phase = 0;
  let dragging = false;
  let discovery = { sinMax: false, sinNeg: false, cosSin: false, sinOne: false };
  let phase2Timer = null;

  // === Phase definitions ===
  const phases = [
    { // 0: Free exploration
      title: '👋 Chào bạn!',
      desc: 'Kéo điểm màu tím xoay quanh vòng tròn. Cứ kéo thử đi!',
    },
    { // 1: Discover sin = height
      title: '🎯 Thử thách 1',
      desc: 'Kéo điểm lên vị trí CAO NHẤT — và xem điều gì xảy ra',
    },
    { // 2: sin max = 1 — AHA! cos appears
      title: '🎉 Tuyệt vời!',
      desc: 'Độ cao lớn nhất = 1. Đây chính là sin(90°) = 1. Bây giờ thử kéo xuống THẤP NHẤT!',
    },
    { // 3: sin min = -1; reveal pattern
      title: '🧠_pattern!',
      desc: 'sin(θ) = tọa độ = độ cao của điểm! Vì sao nó không thể > 1?',
    },
  ];

  function setPhase(i) {
    if (i >= phases.length) return;
    phase = i;
    const p = phases[i];
    chTitle.textContent = p.title;
    chDesc.textContent = p.desc;
    challenge.classList.remove('celebrate');
    if (i >= 2) challenge.classList.add('celebrate');
    // Phase dots
    for (let j = 0; j < 4; j++) {
      const d = document.getElementById('pd' + j);
      d.classList.remove('active', 'done');
      if (j < i) d.classList.add('done');
      else if (j === i) d.classList.add('active');
    }
    // Phase behaviors
    if (i === 1) {
      sinLine.setAttribute('opacity', '1');
      arc.setAttribute('opacity', '0.3');
    }
    if (i === 2) {
      cosLine.setAttribute('opacity', '0.5');
      cosValWrap.style.display = 'flex';
      cosTick.setAttribute('opacity', '0.6');
      dotCos.style.display = 'inline-block';
    }
    if (i === 2) {
      discovery.sinNeg = false; // reset for phase 3
    }
  }

  // Expose nextPhase globally
  window.nextPhase = function() {
    nextBtn.classList.remove('show');
    if (phase < phases.length - 1) {
      setPhase(phase + 1);
    } else {
      // All done — show final card
      showCeleb('🎓', 'Bạn vừa khám phá ra bí mật!', 'sin(θ) và cos(θ) chỉ là tọa độ (y, x) của một điểm chạy trên vòng tròn bán kính 1. Đó là TOÀN BỘ lượng giác!');
    }
  };

  // === Coordinate conversion ===
  function toSvg(clientX, clientY) {
    const p = svg.createSVGPoint();
    p.x = clientX; p.y = clientY;
    const ctm = svg.getScreenCTM();
    if (!ctm) return { x: 0, y: 0 };
    return p.matrixTransform(ctm.inverse());
  }

  function handleDrag(cx, cy) {
    const p = toSvg(cx, cy);
    angle = Math.atan2(-p.y, p.x);
    // Normalize to [-π, π]
    while (angle < -Math.PI) angle += 2 * Math.PI;
    while (angle > Math.PI) angle -= 2 * Math.PI;
    render();
  }

  // === Render ===
  function render() {
    const cosA = Math.cos(angle);
    const sinA = Math.sin(angle);

    // Point
    const px = cosA, py = -sinA; // SVG Y invert
    point.setAttribute('cx', px);
    point.setAttribute('cy', py);
    pointGlow.setAttribute('cx', px);
    pointGlow.setAttribute('cy', py);

    // Radius
    radius.setAttribute('x2', px);
    radius.setAttribute('y2', py);

    // sin line (vertical: from point to x-axis)
    sinLine.setAttribute('x1', px);
    sinLine.setAttribute('y1', 0);
    sinLine.setAttribute('x2', px);
    sinLine.setAttribute('y2', py);

    // cos line (horizontal: from point to y-axis)
    cosLine.setAttribute('x1', 0);
    cosLine.setAttribute('y1', py);
    cosLine.setAttribute('x2', px);
    cosLine.setAttribute('y2', py);

    // Angle arc
    if (Math.abs(angle) > 0.02) {
      arc.setAttribute('d', angleArc(0, 0, 0.2, 0, -angle));
    }

    // sin tick on y-axis
    if (phase >= 1) {
      sinTick.setAttribute('y', -1.08);
      sinTick.setAttribute('x', 0.04);
      sinTick.setAttribute('text-anchor', 'start');
      if (Math.abs(sinA) > 0.95) {
        // Highlight at max
        valLabel.setAttribute('x', px > 0 ? -0.15 : 0.15);
        valLabel.setAttribute('y', py / 2);
        valLabel.setAttribute('text-anchor', px > 0 ? 'end' : 'start');
        valLabel.setAttribute('dominant-baseline', 'middle');
        valLabel.setAttribute('fill', '#34d399');
        valLabel.setAttribute('opacity', '1');
        valLabel.textContent = sinA > 0 ? 'sin = 1 ✓' : 'sin = −1 ✓';
      } else {
        valLabel.setAttribute('opacity', '0');
      }
    }

    // Readout values
    rvSin.textContent = format(sinA);
    rvCos.textContent = format(cosA);
    const deg = angle * 180 / Math.PI;
    rvAngle.textContent = deg.toFixed(0) + '°';

    // Detect discoveries
    checkDiscoveries(sinA, cosA, deg);
  }

  function angleArc(cx, cy, r, startAngle, endAngle) {
    const x1 = cx + r * Math.cos(startAngle);
    const y1 = cy + r * Math.sin(startAngle);
    const x2 = cx + r * Math.cos(endAngle);
    const y2 = cy + r * Math.sin(endAngle);
    const large = Math.abs(endAngle - startAngle) > Math.PI ? 1 : 0;
    const sweep = endAngle > startAngle ? 1 : 0;
    return `M ${x1} ${y1} A ${r} ${r} 0 ${large} ${sweep} ${x2} ${y2}`;
  }

  function format(n) {
    if (Math.abs(n) < 0.005) return '0';
    if (Math.abs(n - 1) < 0.005) return '1';
    if (Math.abs(n + 1) < 0.005) return '−1';
    return (n > 0 ? '' : '−') + Math.abs(n).toFixed(2);
  }

  // === Discovery detection ===
  function checkDiscoveries(sin, cos, deg) {
    // Phase 1: Student reaches near the top (sin ~ 1)
    if (phase === 1 && sin > 0.97) {
      if (!discovery.sinMax) {
        discovery.sinMax = true;
        triggerAha(0);
      }
    }
    // Phase 1 bonus: Student finds negative sin
    if (phase === 1 && sin < -0.9) {
      discovery.sinNeg = true;
    }
    // Phase 2: Student reaches bottom (sin ~ -1)
    if (phase === 2 && sin < -0.97) {
      if (!discovery.sinNeg) {
        discovery.sinNeg = true;
        triggerAha(1);
      }
    }
  }

  function triggerAha(type) {
    if (type === 0) {
      // Reached top: sin max = 1
      showCeleb('🎯', 'Độ cao lớn nhất = 1!',
        'Điểm không thể đi xa hơn nữa vì vòng tròn có bán kính 1.\n\n' +
        'Đây chính là **sin(90°) = 1**!\n\n' +
        'sin(θ) = độ cao (tọa độ y) của điểm. Vì điểm nằm trên vòng tròn bán kính 1 nên sin KHÔNG BAO GIỜ lớn hơn 1!');
    }
    if (type === 1) {
      // Reached bottom: sin min = -1
      const nextBtnEl = document.getElementById('next-btn');
      showCeleb('💡', 'sin(θ) luôn nằm trong [−1, 1]! Ừng! Ừng!',
        'Kéo lên → sin dương. Kéo xuống → sin âm.\n\n' +
        'Tại điểm thấp nhất: **sin(270°) = −1**\n\n' +
        'Vì sao? Vì điểm không thể nằm NGOÀI vòng tròn! Bán kính = 1 → sin luôn trong [−1, 1] ' +
        'Đó là lý do tại sao máy tính sin hay cho kết quả trong khoảng này!');
    }
  }

  // === Celebration card ===
  function showCeleb(emoji, title, text) {
    celebEmoji.textContent = emoji;
    celebTitle.textContent = title;
    celebText.innerHTML = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/\n/g, '<br>');
    celeb.classList.add('show');
    nextBtn.classList.add('show');
  }

  window.dismissCeleb = function() {
    celeb.classList.remove('show');
  };

  // === Drag events ===
  svg.addEventListener('mousedown', e => { dragging = true; handleDrag(e.clientX, e.clientY); });
  window.addEventListener('mousemove', e => { if (dragging) handleDrag(e.clientX, e.clientY); });
  window.addEventListener('mouseup', () => { dragging = false; });

  svg.addEventListener('touchstart', e => { e.preventDefault(); dragging = true; const t = e.touches[0]; handleDrag(t.clientX, t.clientY); }, { passive: false });
  window.addEventListener('touchmove', e => { if (!dragging) return; e.preventDefault(); const t = e.touches[0]; handleDrag(t.clientX, t.clientY); }, { passive: false });
  window.addEventListener('touchend', () => { dragging = false; });

  // === Keyboard ===
  window.addEventListener('keydown', e => {
    if (e.key === 'ArrowRight' || e.key === 'ArrowUp') { angle += Math.PI / 60; render(); e.preventDefault(); }
    else if (e.key === 'ArrowLeft' || e.key === 'ArrowDown') { angle -= Math.PI / 60; render(); e.preventDefault(); }
    else if (e.key === ' ') { angle = 0; render(); e.preventDefault(); }
  });

  // === Init ===
  cosValWrap.style.display = 'none';
  dotCos.style.display = 'none';
  setPhase(0);
  render();

  // Auto-advance phase 0 after 8 seconds of dragging
  const idleCheck = setInterval(() => {
    if (phase === 0) {
      setPhase(1);
      readout.classList.add('visible');
      clearInterval(idleCheck);
    }
  }, 8000);

  // Detect first drag to start timer
  const origHandleDrag = handleDrag;
  let firstDrag = true;
  let startIdleTimer = null;
  const _orig = handleDrag;
  // We need to wrap, but handleDrag is already set. Let's use a flag.
  // Actually the check above (setInterval) handles auto-advance.
  // Let's just listen for any drag and show readout immediately.
  const addReadout = () => {
    if (!readout.classList.contains('visible')) {
      readout.classList.add('visible');
    }
  };
  svg.addEventListener('mousedown', addReadout);
  svg.addEventListener('touchstart', addReadout, { once: true });

})();
</script>
</body>
</html>
