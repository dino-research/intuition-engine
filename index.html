<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cái Thang — Lượng Giác Đơn Giản</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#faf9f6;color:#1a1a1a;min-height:100dvh;display:flex;flex-direction:column;overflow:hidden;-webkit-user-select:none;user-select:none}
    .topbar{position:fixed;top:0;left:0;right:0;z-index:10;display:flex;align-items:center;padding:10px 16px;background:rgba(250,249,246,.95);border-bottom:1px solid #e5e5e5}
    .topbar .t{font-size:.95rem;font-weight:700;color:#7c3aed}
    .steps{display:flex;gap:4px;margin-left:auto}
    .step{width:28px;height:4px;border-radius:2px;background:#e5e7eb;transition:.3s}
    .step.active{background:#7c3aed;width:40px}
    .step.done{background:#22c55e}
    .chal{position:fixed;top:50px;left:50%;transform:translateX(-50%);z-index:10;max-width:400px;width:90%;padding:14px 18px;background:#fff;border:1px solid #e5e7eb;border-radius:14px;text-align:center;box-shadow:0 4px 20px rgba(0,0,0,.08)}
    .chal h3{font-size:.88rem;color:#7c3aed;margin-bottom:4px}
    .chal p{font-size:.73rem;color:#6b7280;line-height:1.4}
    .goal{margin-top:8px;padding:6px 12px;background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;font-size:.7rem;color:#15803d;font-weight:600}
    .cw{flex:1;display:flex;align-items:center;justify-content:center;padding:130px 8px 160px}
    canvas{width:100%;max-width:500px;aspect-ratio:4/3;touch-action:none;border-radius:12px;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,.08)}
    .bp{position:fixed;bottom:0;left:0;right:0;z-index:10;padding:10px 16px 14px;background:rgba(250,249,246,.97);border-top:1px solid #e5e5e5}
    .sr{display:flex;align-items:center;gap:10px;max-width:420px;margin:0 auto 8px}
    .sr label{font-size:.82rem;color:#374151;white-space:nowrap}
    .slider{flex:1;-webkit-appearance:none;height:6px;border-radius:3px;background:linear-gradient(90deg,#ddd,#7c3aed)}
    .slider::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:#7c3aed;cursor:pointer;box-shadow:0 0 0 3px rgba(124,58,237,.2)}
    .av{font-family:'SF Mono',monospace;font-size:1rem;font-weight:800;color:#7c3aed;min-width:40px;text-align:right}
    .inf{display:flex;gap:8px;max-width:420px;margin:0 auto}
    .ic{flex:1;text-align:center;padding:6px 4px;border-radius:8px;background:#f5f3ff}
    .ic .l{font-size:.62rem;color:#6b7280}
    .ic .v{font-family:'SF Mono',monospace;font-size:.9rem;font-weight:800;margin-top:1px}
    .ic.red .v{color:#ef4444}
    .ic.blue .v{color:#3b82f6}
    .ic.purple .v{color:#7c3aed}
    /* Big NEXT button - always visible */
    .nxt{
      display:block;margin:0 auto;
      background:#22c55e;color:#fff;font-weight:700;
      border:none;padding:10px 24px;border-radius:10px;
      font-size:.88rem;cursor:pointer;
      box-shadow:0 4px 16px rgba(34,197,94,.3);
      transition:all .2s;
      min-width:160px;
    }
    .nxt:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 6px 20px rgba(34,197,94,.4)}
    .nxt:disabled{background:#d1d5db;box-shadow:none;cursor:not-allowed;color:#9ca3af}
    /* Celebration */
    .cel{position:fixed;inset:0;z-index:30;background:rgba(0,0,0,.4);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;padding:20px}
    .cel.show{display:flex}
    .card{background:#fff;border-radius:18px;padding:28px 24px;max-width:360px;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.12);animation:su .4s ease}
    @keyframes su{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
    .card .em{font-size:2.8rem;margin-bottom:6px}
    .card h3{font-size:1.1rem;color:#7c3aed;margin-bottom:8px}
    .card p{font-size:.82rem;color:#4b5563;line-height:1.65;margin-bottom:14px}
    .card strong{color:#7c3aed}
    .card button{background:#7c3aed;color:#fff;font-weight:700;border:none;padding:10px 28px;border-radius:10px;cursor:pointer;font-size:.92rem}
  </style>
</head>
<body>
<div class="topbar">
  <div class="t">🪜 Cái Thang</div>
  <div class="steps">
    <div class="step active" id="s0"></div>
    <div class="step" id="s1"></div>
    <div class="step" id="s2"></div>
    <div class="step" id="s3"></div>
    <div class="step" id="s4"></div>
  </div>
</div>
<div class="chal">
  <h3 id="cT"></h3>
  <p id="cD"></p>
  <div class="goal" id="cG"></div>
</div>
<div class="cw"><canvas id="cv" width="500" height="375"></canvas></div>
<div class="bp">
  <div class="sr">
    <label>📐 Góc</label>
    <input type="range" class="slider" id="sl" min="10" max="80" value="60" step="1">
    <span class="av" id="av">60°</span>
  </div>
  <div class="inf">
    <div class="ic red"><div class="l">Độ cao</div><div class="v" id="hv">4.33m</div></div>
    <div class="ic blue"><div class="l">Chân thang</div><div class="v" id="bv">2.50m</div></div>
    <div class="ic purple"><div class="l">Thang dài</div><div class="v">5.00m</div></div>
  </div>
  <button class="nxt" id="nxt">Tiếp ▸</button>
</div>
<div class="cel"><div class="card"><div class="em" id="cEm"></div><h3 id="cTt"></h3><p id="cTx"></p><button onclick="celClose();adv()">Tiếp ▸</button></div></div>
<script>
const cv=document.getElementById('cv'),cx=cv.getContext('2d');
const W=500,H=375;
cv.width=W*devicePixelRatio;cv.height=H*devicePixelRatio;
cv.style.width=W+'px';cv.style.height=H+'px';
cx.scale(devicePixelRatio,devicePixelRatio);
let angle=60,phase=0;
const L=5,SC=(W*.75)/(L*1.2);
const P=[
  {t:"👆 Kéo góc để thay đổi thang",d:"Nhìn độ cao thang chạm tường thay đổi thế nào?",g:"🎯 Kéo thử vài góc rồi nhấn TIẾP",c:()=>true,
   cl:null},
  {t:"🤔 Góc nào thang LEO CAO nhất?",d:"Kéo đến góc lớn — nhìn số ĐỘ CAO đỏ phía dưới.",g:"🎯 Kéo đến ≥ 70° rồi nhấn TIẾP",c:()=>angle>=70,
   cl:{e:'💡',t:'Càng dốc, càng cao!',p:'Nhưng góc 90° = thang thẳng đứng = dễ đổ!<br><br>Người ta cần tính <strong>góc an toàn</strong>.'}},
  {t:"📐 Góc 30° — đặc biệt!",d:"Kéo về đúng 30°. Nhìn <strong>độ cao</strong> so với <strong>5m</strong>.",g:"🎯 Kéo đến góc 30° (±2°)",c:()=>Math.abs(angle-30)<=2,
   cl:{e:'🤯',t:'Độ cao = CHÍNH XÁC một nửa!',p:'Thang 5m, 30° → độ cao = <strong>2.50m = ½</strong>!<br><br>Tỉ lệ ½ <strong>LUÔN đúng</strong> ở 30°!<br><br>→ <strong>sin(30°) = 0.5</strong>'}},
  {t:"🧐 So sánh sin các góc",d:"Thử: sin(30°)=0.5, sin(45°)=?, sin(60°)=?",g:"🎯 Kéo đến ≥ 55° rồi nhấn TIẾP",c:()=>angle>=55,
   cl:{e:'📊',t:'Mỗi góc = một tỉ lệ!',p:'sin(30°) = 0.500 → 50% chiều dài<br>sin(45°) = 0.707 → 70.7%<br>sin(60°) = 0.866 → 86.6%<br><br>Đó là <strong>BẢNG LƯỢNG GIÁC</strong> trong SGK!'}},
  {t:"🎓 Sin/Cos nghĩa là gì?",d:"Nhấn TIẾP để xem!",g:"",c:()=>true,
   cl:{e:'🎉',t:'Lượng giác = tỉ lệ của cái thang!',p:'<strong>sin(θ)</strong> = Độ cao ÷ Chiều dài<br><strong>cos(θ)</strong> = Khoảng cách ÷ Chiều dài<br><br>🔴 Độ cao = 5 × sin(θ)<br>🔵 Chân thang = 5 × cos(θ)<br><br>Bảng sin/cos = <strong>bản tra cứu tỉ lệ</strong> cho mỗi góc!'}}
];
function ui(){
  const p=P[phase];
  document.getElementById('cT').textContent=p.t;
  document.getElementById('cD').textContent=p.d;
  document.getElementById('cG').textContent=p.g;
  const ss=document.querySelectorAll('.step');
  ss.forEach((s,i)=>{s.classList.remove('active','done');if(i<phase)s.classList.add('done');else if(i===phase)s.classList.add('active')});
  const btn=document.getElementById('nxt');
  const ok=p.c();
  btn.disabled=!ok;
  btn.textContent=ok?('Tiếp ▸'):'← Kéo góc đạt yêu cầu';
  if(phase===4)btn.textContent='🎓 Xem bí mật!';
}
document.getElementById('sl').addEventListener('input',function(){
  angle=+this.value;
  document.getElementById('av').textContent=angle+'°';
  ui();draw();
});
function celShow(e,t,p){
  document.getElementById('cEm').textContent=e;
  document.getElementById('cTt').textContent=t;
  document.getElementById('cTx').innerHTML=p.replace(/\n/g,'<br>').replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>');
  document.getElementById('cel').classList.add('show');
}
function celClose(){document.getElementById('cel').classList.remove('show')}
function adv(){
  const p=P[phase];
  if(!p.c())return;
  if(p.cl)celShow(p.cl.e,p.cl.t,p.cl.p);
  if(phase<4){phase++;ui();draw();}
}
document.getElementById('nxt').addEventListener('click',adv);
function draw(){
  cx.clearRect(0,0,W,H);
  const aR=angle*Math.PI/180,h=L*Math.sin(aR),b=L*Math.cos(aR);
  const gY=H*.82,wX=W*.12;
  const sk=cx.createLinearGradient(0,0,0,gY);sk.addColorStop(0,'#dce8f8');sk.addColorStop(1,'#f0f4ff');
  cx.fillStyle=sk;cx.fillRect(0,0,W,gY);
  cx.fillStyle='#e8d9c1';cx.fillRect(0,gY,W,H-gY);
  cx.strokeStyle='#c4a978';cx.lineWidth=2;cx.beginPath();cx.moveTo(0,gY);cx.lineTo(W,gY);cx.stroke();
  cx.fillStyle='#c9c9d4';cx.fillRect(wX-10,gY-260,10,260);
  cx.strokeStyle='#aaa';cx.lineWidth=1;
  for(let y=gY-260;y<gY;y+=20){cx.beginPath();cx.moveTo(wX-10,y);cx.lineTo(wX,y);cx.stroke()}
  const tX=wX,tY=gY-h*SC,baX=wX+b*SC;
  cx.strokeStyle='#d97706';cx.lineWidth=4;cx.lineCap='round';
  const of=3,px=Math.sin(aR)*of,py=Math.cos(aR)*of;
  cx.beginPath();cx.moveTo(baX-px,gY-py);cx.lineTo(tX-px,tY-py);cx.stroke();
  cx.beginPath();cx.moveTo(baX+px,gY+py);cx.lineTo(tX+px,tY+py);cx.stroke();
  cx.strokeStyle='rgba(217,119,6,.5)';cx.lineWidth=2;
  for(let i=1;i<=7;i++){const f=i/8,rx=baX+(tX-baX)*f,ry=gY+(tY-gY)*f;cx.beginPath();cx.moveTo(rx-px,ry-py);cx.lineTo(rx+px,ry+py);cx.stroke()}
  cx.setLineDash([4,3]);cx.strokeStyle='#ef4444';cx.lineWidth=2;cx.beginPath();cx.moveTo(wX+20,gY);cx.lineTo(wX+20,tY+8);cx.stroke();cx.setLineDash([]);
  cx.fillStyle='#ef4444';cx.beginPath();cx.moveTo(wX+20,tY+3);cx.lineTo(wX+15,tY+13);cx.lineTo(wX+25,tY+13);cx.closePath();cx.fill();
  cx.setLineDash([4,3]);cx.strokeStyle='#3b82f6';cx.lineWidth=2;cx.beginPath();cx.moveTo(wX,gY+12);cx.lineTo(baX,gY+12);cx.stroke();cx.setLineDash([]);
  cx.strokeStyle='#7c3aed';cx.lineWidth=2;cx.beginPath();cx.arc(wX,gY,30,0,-aR,true);cx.stroke();
  cx.fillStyle='#7c3aed';cx.font='bold 14px sans-serif';cx.textAlign='left';cx.fillText(angle+'°',wX+35,gY-10);
  cx.fillStyle='#ef4444';cx.font='bold 12px sans-serif';cx.fillText(h.toFixed(2)+'m',wX+25,(gY+tY)/2);
  cx.fillStyle='#3b82f6';cx.textAlign='center';cx.fillText(b.toFixed(2)+'m',(wX+baX)/2,gY+28);
  //Person
  const ppx=baX-18;cx.strokeStyle='#6b7280';cx.lineWidth=2;cx.lineCap='round';
  cx.beginPath();cx.arc(ppx,gY-24,7,0,Math.PI*2);cx.stroke();
  cx.beginPath();cx.moveTo(ppx,gY-17);cx.lineTo(ppx,gY-5);cx.stroke();
  cx.beginPath();cx.moveTo(ppx,gY-5);cx.lineTo(ppx-6,gY);cx.stroke();
  cx.beginPath();cx.moveTo(ppx,gY-5);cx.lineTo(ppx+6,gY);cx.stroke();
  cx.beginPath();cx.moveTo(ppx-3,gY-13);cx.lineTo(baX-8,gY-10);cx.stroke();
  document.getElementById('hv').textContent=h.toFixed(2)+'m';
  document.getElementById('bv').textContent=b.toFixed(2)+'m';
}
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'){angle=Math.min(80,angle+1);document.getElementById('sl').value=angle;document.getElementById('av').textContent=angle+'°';ui();draw();e.preventDefault()}
  if(e.key==='ArrowLeft'){angle=Math.max(10,angle-1);document.getElementById('sl').value=angle;document.getElementById('av').textContent=angle+'°';ui();draw();e.preventDefault()}
});
ui();draw();
</script>
</body>
</html>
