<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Archery Math — Intuition Engine</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a1a;
      color: #e4e4e7;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      -webkit-user-select: none;
      user-select: none;
    }

    /* === TOP BAR === */
    .topbar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 10;
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 16px;
      background: rgba(10,10,26,0.9);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid #1a1a2e;
    }
    .topbar .title { font-size: 0.95rem; font-weight: 700; color: #a78bfa; }
    .topbar .score { font-size: 0.8rem; color: #71717a; }
    .topbar .score span { color: #34d399; font-weight: 700; }

    /* === GAME CANVAS === */
    .game-wrap {
      flex: 1; display: flex; align-items: center; justify-content: center;
      padding-top: 50px;
    }
    canvas#game {
      width: 100%; max-width: 700px;
      aspect-ratio: 16/9;
      touch-action: none;
      cursor: crosshair;
    }

    /* === CONTROLS === */
    .controls {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 10;
      padding: 12px 16px;
      background: rgba(10,10,26,0.9);
      backdrop-filter: blur(12px);
      border-top: 1px solid #1a1a2e;
    }
    .ctrl-row {
      display: flex; align-items: center; gap: 12px;
      max-width: 500px; margin: 0 auto;
    }
    .ctrl-label {
      font-size: 0.85rem; color: #a1a1aa;
      white-space: nowrap; min-width: 50px;
    }
    .ctrl-slider {
      flex: 1; -webkit-appearance: none; appearance: none;
      height: 6px; border-radius: 3px;
      background: linear-gradient(90deg, #27272a, #a78bfa);
      outline: none;
    }
    .ctrl-slider::-webkit-slider-thumb {
      -webkit-appearance: none; appearance: none;
      width: 20px; height: 20px; border-radius: 50%;
      background: #a78bfa; cursor: pointer;
      box-shadow: 0 0 8px rgba(167,139,250,0.5);
    }
    .ctrl-val {
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 0.9rem; font-weight: 700;
      color: #fbbf24; min-width: 40px; text-align: right;
    }
    .shoot-btn {
      display: block; margin: 10px auto 0;
      background: #f87171; color: #fff;
      font-size: 1rem; font-weight: 800;
      border: none; padding: 10px 36px;
      border-radius: 10px; cursor: pointer;
      transition: all 0.2s;
    }
    .shoot-btn:hover { background: #fb923c; transform: scale(1.05); }
    .shoot-btn:disabled { background: #3f3f46; cursor: not-allowed; transform: none; }

    /* === CHALLENGE BANNER === */
    .challenge {
      position: fixed; top: 48px; left: 50%; transform: translateX(-50%); z-index: 10;
      max-width: 380px; width: 90%;
      padding: 10px 16px;
      background: rgba(24,24,40,0.95);
      border: 1px solid #27272a;
      border-radius: 12px;
      text-align: center;
    }
    .challenge h3 { font-size: 0.9rem; color: #fbbf24; margin-bottom: 4px; }
    .challenge p { font-size: 0.78rem; color: #a1a1aa; line-height: 1.4; }

    /* === MATH PANEL (slide up) === */
    .math-panel {
      position: fixed; bottom: 120px; left: 50%; transform: translateX(-50%);
      max-width: 400px; width: 90%;
      padding: 16px 20px;
      background: rgba(18,18,36,0.96);
      border: 1px solid #3f3f46;
      border-radius: 16px;
      display: none; z-index: 20;
    }
    .math-panel.show { display: block; animation: slideUp 0.4s ease; }
    @keyframes slideUp {
      from { opacity: 0; transform: translateX(-50%) translateY(20px); }
      to { opacity: 1; transform: translateX(-50%) translateY(0); }
    }
    .math-panel h4 { color: #a78bfa; font-size: 0.9rem; margin-bottom: 8px; }
    .math-panel p { font-size: 0.82rem; color: #d4d4d8; line-height: 1.6; margin-bottom: 6px; }

    /* === CELEBRATION === */
    .celeb-overlay {
      position: fixed; inset: 0; z-index: 30;
      background: rgba(10,10,26,0.85);
      backdrop-filter: blur(6px);
      display: none; align-items: center; justify-content: center;
    }
    .celeb-overlay.show { display: flex; }
    .celeb-card {
      background: #18181b;
      border: 1px solid #3f3f46;
      border-radius: 20px;
      padding: 28px 24px;
      max-width: 360px;
      text-align: center;
    }
    .celeb-card .emoji { font-size: 3rem; margin-bottom: 8px; }
    .celeb-card h3 { color: #34d399; font-size: 1.2rem; margin-bottom: 8px; }
    .celeb-card p { font-size: 0.85rem; color: #a1a1aa; line-height: 1.6; margin-bottom: 14px; }
    .celeb-card button {
      background: #a78bfa; color: #0a0a1a;
      font-weight: 700; border: none;
      padding: 10px 28px; border-radius: 10px;
      cursor: pointer; font-size: 0.95rem;
    }

    /* === PHASE DOTS === */
    .dots {
      position: fixed; top: 56px; right: 12px; z-index: 10;
      display: flex; flex-direction: column; gap: 6px;
    }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: #27272a; transition: all 0.3s; }
    .dot.active { background: #a78bfa; }
    .dot.done { background: #34d399; }

    /* Phase transitions */
    .phase-label {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      z-index: 25;
      font-size: 1.5rem; font-weight: 800;
      color: #a78bfa;
      text-align: center;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.5s;
    }
    .phase-label.show { opacity: 1; }
  </style>
</head>
<body>

<div class="topbar">
  <div class="title">🏹 Archery Math</div>
  <div class="score">Trúng: <span id="hit-count">0</span>/<span id="total-shots">0</span></div>
</div>

<div class="dots">
  <div class="dot active" id="d0"></div>
  <div class="dot" id="d1"></div>
  <div class="dot" id="d2"></div>
  <div class="dot" id="d3"></div>
</div>

<div class="challenge" id="challenge">
  <h3 id="ch-title">🎯 Bắn trúng mục tiêu!</h3>
  <p id="ch-desc">Kéo thanh góc rồi nhấn BẮN. Trúng hồng tâm = 10đ</p>
</div>

<div class="game-wrap">
  <canvas id="game"></canvas>
</div>

<div class="controls">
  <div class="ctrl-row">
    <span class="ctrl-label">📐 Góc</span>
    <input type="range" class="ctrl-slider" id="angle-slider" min="5" max="85" value="45" step="1">
    <span class="ctrl-val" id="angle-val">45°</span>
  </div>
  <div class="ctrl-row">
    <span class="ctrl-label">💨 Lực</span>
    <input type="range" class="ctrl-slider" id="power-slider" min="10" max="30" value="20" step="1">
    <span class="ctrl-val" id="power-val">20</span>
  </div>
  <button class="shoot-btn" id="shoot-btn" onclick="shoot()">🏹 BẮN!</button>
</div>

<div class="math-panel" id="math-panel">
  <h4 id="math-title"></h4>
  <p id="math-body"></p>
</div>

<div class="celeb-overlay" id="celeb">
  <div class="celeb-card">
    <div class="emoji" id="celeb-emoji">🎉</div>
    <h3 id="celeb-title"></h3>
    <p id="celeb-text"></p>
    <button onclick="dismissCeleb(); nextPhase();" id="celeb-btn">Tiếp tục ▸</button>
  </div>
</div>

<div class="phase-label" id="phase-label"></div>

<script>
// === GAME ENGINE ===
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

// Responsive canvas
function resizeCanvas() {
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = Math.min(700, rect.width - 32);
  canvas.height = canvas.width * 9/16;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// === GAME STATE ===
let angle = 45;    // degrees
let power = 20;
let flying = false;
let arrow = { x: 0, y: 0, vx: 0, vy: 0, trail: [] };
let groundY;       // visual ground on canvas
let targetX, targetY, targetR;
let hitCount = 0, totalShots = 0;
let phase = 0;
let phase1Target = { x: 0, y: 0, r: 0 }; // target for phase 1
let attempts = 0;  // shots in current phase
let bestDist = Infinity;

// Physics
const GRAVITY = 9.8;
const SCALE = 10; // pixels per meter

// === Setup target ===
function setupTarget() {
  groundY = canvas.height * 0.88;
  // Phase-based targets
  if (phase === 0 || phase === 1) {
    targetX = canvas.width * 0.75;
    targetY = groundY;
    targetR = 30;
  }
  if (phase === 2) {
    targetX = canvas.width * 0.8;
    targetY = groundY - 60;
    targetR = 20;
  }
  if (phase === 3) {
    targetX = canvas.width * 0.85;
    targetY = groundY - 100;
    targetR = 15;
  }
}

// === DRAW ===
function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Sky gradient
  const sky = ctx.createLinearGradient(0, 0, 0, groundY);
  sky.addColorStop(0, '#0c0c28');
  sky.addColorStop(1, '#1a1a3a');
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, canvas.width, groundY);

  // Ground
  ctx.fillStyle = '#1a2e1a';
  ctx.fillRect(0, groundY, canvas.width, canvas.height - groundY);
  ctx.fillStyle = '#2a4a2a';
  ctx.fillRect(0, groundY, canvas.width, 3);

  // Stars
  for (let i = 0; i < 30; i++) {
    ctx.fillStyle = `rgba(255,255,255,${0.3 + Math.random()*0.4})`;
    ctx.fillRect((i * 73 + 17) % canvas.width, (i * 41 + 11) % (groundY * 0.5), 1.5, 1.5);
  }

  // Target
  drawTarget(targetX, targetY, targetR);

  // Archer (bow)
  const bowX = 40, bowY = groundY - 40;
  drawArcher(bowX, bowY, angle);

  // Trajectory preview (dotted)
  if (!flying) {
    drawTrajectoryPreview(bowX + 30, bowY, angle, power);
  }

  // Arrow in flight
  if (flying) {
    drawArrowProjectile(arrow.x, arrow.y);
    // Trail
    if (arrow.trail.length > 2) {
      ctx.beginPath();
      ctx.strokeStyle = 'rgba(248,113,113,0.3)';
      ctx.lineWidth = 1;
      for (let i = 0; i < arrow.trail.length; i++) {
        const p = arrow.trail[i];
        if (i === 0) ctx.moveTo(p.x, p.y);
        else ctx.lineTo(p.x, p.y);
      }
      ctx.stroke();
    }
  }

  // Distance text
  if (!flying) {
    ctx.fillStyle = '#a1a1aa';
    ctx.font = '11px sans-serif';
    const dist = ((targetX - 70) / SCALE).toFixed(0);
    ctx.textAlign = 'center';
    ctx.fillText(`${dist}m`, (70 + targetX) / 2, groundY + 18);
  }
}

function drawTarget(x, y, r) {
  // Stand
  ctx.fillStyle = '#3f2a14';
  ctx.fillRect(x - 3, y, 6, (canvas.height - y));
  // Bullseye rings
  const colors = ['#f87171', '#fb923c', '#fbbf24', '#34d399', '#60a5fa'];
  for (let i = 4; i >= 0; i--) {
    ctx.beginPath();
    ctx.arc(x, y, r * (4 - i) / 4, Math.PI, 0, false); // half circle
    ctx.fill();
  }
  // Flat bottom
  ctx.fillStyle = '#f87171';
  ctx.fillRect(x - r, y, r * 2, 4);
  for (let i = 4; i >= 1; i--) {
    ctx.fillStyle = colors[4-i+1] || '#f87171';
    ctx.fillRect(x - r*(i)/4, y, r * 2 * (i)/4, 4);
  }
}

function drawArcher(x, y, ang) {
  // Stick figure archer
  ctx.strokeStyle = '#a78bfa';
  ctx.lineWidth = 2;
  ctx.lineCap = 'round';

  // Head
  ctx.beginPath(); ctx.arc(x, y - 25, 6, 0, Math.PI*2); ctx.stroke();
  // Body
  ctx.beginPath(); ctx.moveTo(x, y - 19); ctx.lineTo(x, y); ctx.stroke();
  // Legs
  ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(x-8, y+20); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(x+8, y+20); ctx.stroke();
  // Bow arm
  const rad = -ang * Math.PI / 180;
  const armLen = 15;
  ctx.beginPath();
  ctx.moveTo(x, y-15);
  ctx.lineTo(x + armLen * Math.cos(rad), y - 15 + armLen * Math.sin(rad));
  ctx.stroke();
  // Bow arc
  ctx.beginPath();
  ctx.strokeStyle = '#fbbf24';
  ctx.lineWidth = 2;
  const tip1x = x + 10 * Math.cos(rad + 0.5), tip1y = y-15 + 10 * Math.sin(rad + 0.5);
  const tip2x = x + 10 * Math.cos(rad - 0.5), tip2y = y-15 + 10 * Math.sin(rad - 0.5);
  ctx.moveTo(tip1x, tip1y);
  ctx.quadraticCurveTo(x + 15 * Math.cos(rad), y - 15 + 15 * Math.sin(rad), tip2x, tip2y);
  ctx.stroke();
}

function drawTrajectoryPreview(x, y, ang, pw) {
  const rad = -ang * Math.PI / 180;
  const vx = pw * Math.cos(rad) * SCALE;
  const vy = pw * Math.sin(rad) * SCALE;
  let px = x, py = y, t = 0;
  ctx.setLineDash([3, 4]);
  ctx.strokeStyle = 'rgba(167,139,250,0.25)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(x, y);
  for (let i = 0; i < 60; i++) {
    t += 0.03;
    px = x + vx * t;
    py = y + vy * t * SCALE + 0.5 * GRAVITY * t * t * SCALE;
    if (py > groundY || px > canvas.width) break;
    ctx.lineTo(px, py);
  }
  ctx.stroke();
  ctx.setLineDash([]);
}

function drawArrowProjectile(x, y) {
  ctx.fillStyle = '#f87171';
  ctx.beginPath();
  ctx.arc(x, y, 4, 0, Math.PI * 2);
  ctx.fill();
  // Glow
  ctx.fillStyle = 'rgba(248,113,113,0.3)';
  ctx.beginPath();
  ctx.arc(x, y, 8, 0, Math.PI * 2);
  ctx.fill();
}

// === PHYSICS ===
function shoot() {
  if (flying) return;
  flying = true;
  totalShots++;
  attempts++;
  document.getElementById('total-shots').textContent = totalShots;
  document.getElementById('shoot-btn').disabled = true;

  const bowX = 70, bowY = groundY - 40;
  const rad = -angle * Math.PI / 180;

  arrow.x = bowX;
  arrow.y = bowY;
  arrow.vx = power * Math.cos(rad) * SCALE;
  arrow.vy = power * Math.sin(rad); // velocity in m/s, not scaled
  arrow.trail = [{ x: bowX, y: bowY }];

  animateArrow(bowX, bowY);
}

function animateArrow() {
  let t = 0;
  const bowX = 70, bowY = groundY - 40;

  function step() {
    t += 0.04;
    arrow.x = bowX + arrow.vx * t;
    arrow.y = bowY + (arrow.vy * t + 0.5 * GRAVITY * t * t) * SCALE;

    if (arrow.trail.length < 40)
      arrow.trail.push({ x: arrow.x, y: arrow.y });

    if (arrow.y >= groundY || arrow.x > canvas.width + 20) {
      // Hit detection
      const dist = Math.hypot(arrow.x - targetX, arrow.y - targetY);
      checkHit(dist);
      flying = false;
      document.getElementById('shoot-btn').disabled = false;
      draw();
      return;
    }

    draw();
    requestAnimationFrame(step);
  }
  step();
}

function checkHit(dist) {
  if (dist < targetR) {
    hitCount++;
    document.getElementById('hit-count').textContent = hitCount;
    // Success!
    if (phase === 1) {
      showCeleb('🎯', 'Trúng rồi!', 'Bây giờ nghĩ thử: góc nào để viên đạn bay XA NHẤT? Thử bắn với góc 30°, 45°, 60° xem!');
    } else if (phase === 2) {
      // Show math!
      showMathReveal();
    } else {
      showCeleb('🎉', 'Trúng hồng tâm!', 'Bạn đang dùng lượng giác đó — không cần biết công thức, nhưng đang dùng!');
    }
  } else {
    // Miss feedback
    if (dist > targetR * 3) {
      showPhaseLabel('Bắn trật! 🔁 Thử lại');
    }
    setTimeout(() => draw(), 600);
  }
}

// === UI HELPERS ===
function showPhaseLabel(text) {
  const el = document.getElementById('phase-label');
  el.textContent = text;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 1200);
}

function showCeleb(emoji, title, text) {
  document.getElementById('celeb-emoji').textContent = emoji;
  document.getElementById('celeb-title').textContent = title;
  document.getElementById('celeb-text').textContent = text;
  document.getElementById('celeb').classList.add('show');
}
window.dismissCeleb = function() {
  document.getElementById('celeb').classList.remove('show');
};

function showMathReveal() {
  const panel = document.getElementById('math-panel');
  document.getElementById('math-title').textContent = '🧠 Lượng giác nằm trong game này!';
  document.getElementById('math-body').innerHTML = `
    Khi em bắn mũi tên góc <strong>${angle}°</strong> với lực <strong>${power}</strong>:<br><br>
    • <span style="color:#f87171">sin(${angle}°) = ${(Math.sin(-angle * Math.PI / 180)).toFixed(2)}</span> → thành phần bay <strong>lên</strong><br>
    • <span style="color:#60a5fa">cos(${angle}°) = ${(Math.cos(angle * Math.PI / 180)).toFixed(2)}</span> → thành phần bay <strong>ngang</strong><br><br>
    <em><strong>sin = bay cao. Cos = bay xa.</strong></em><br>
    Game này tính đường bay của mũi tên bằng sin và cos — chính là tọa độ trên vòng tròn đơn vị!
  `;
  panel.classList.add('show');
  // Re-render canvas after short delay
  setTimeout(() => { flying = false; document.getElementById('shoot-btn').disabled = false; draw(); }, 400);
}

// === Sliders ===
const angleSlider = document.getElementById('angle-slider');
const powerSlider = document.getElementById('power-slider');
angleSlider.addEventListener('input', e => {
  angle = parseInt(e.target.value);
  document.getElementById('angle-val').textContent = angle + '°';
  if (!flying) draw();
});
powerSlider.addEventListener('input', e => {
  power = parseInt(e.target.value);
  document.getElementById('power-val').textContent = power;
  if (!flying) draw();
});

// === PHASES ===
const phaseData = [
  { title: '🎯 Làm quen!', desc: 'Nhấn BẮN. Xem mũi tên bay. Kéo thử các góc.' },
  { title: '🏆 Thử thách', desc: 'Bắn trúng mục tiêu! Thử các góc khác nhau: 30°, 45°, 60°' },
  { title: '🧐 Câu hỏi', desc: 'Góc nào đi XA NHẤT? Thử: 30° vs 45° vs 60°' },
  { title: '💡 Khám phá', desc: 'Bắn vào mục tiêu trên cao. Góc nào bây giờ?' },
];

function updatePhaseUI() {
  setupTarget();
  const p = phaseData[phase];
  document.getElementById('ch-title').textContent = p.title;
  document.getElementById('ch-desc').textContent = p.desc;
  for (let i = 0; i < 4; i++) {
    const d = document.getElementById('d' + i);
    d.classList.remove('active', 'done');
    if (i < phase) d.classList.add('done');
    else if (i === phase) d.classList.add('active');
  }
}

window.nextPhase = function() {
  if (phase < 3) {
    phase++;
    updatePhaseUI();
    draw();
    // Auto-reset target for new phase
    attempts = 0;
    if (phase === 2) {
      // Reset target to far position
      targetX = canvas.width * 0.85;
      targetY = groundY;
      targetR = 25;
    }
    showPhaseLabel('Phase ' + (phase + 1));
    setTimeout(() => draw(), 800);
  }
};

// === INIT ===
setupTarget();
updatePhaseUI();
draw();

</script>
</body>
</html>
