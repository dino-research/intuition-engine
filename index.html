<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cái Thang — Lượng Giác Đơn Giản</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#faf9f6;color:#1a1a1a;min-height:100dvh;display:flex;flex-direction:column;overflow:hidden;-webkit-user-select:none;user-select:none}
    .topbar{position:fixed;top:0;left:0;right:0;z-index:10;display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:rgba(250,249,246,.95);border-bottom:1px solid #e5e5e5}
    .topbar .t{font-size:.95rem;font-weight:700;color:#7c3aed}
    .topbar .st{text-align:right;font-size:.72rem;color:#6b7280}
    .chal{position:fixed;top:50px;left:50%;transform:translateX(-50%);z-index:10;max-width:380px;width:90%;padding:10px 16px;background:#fff;border:1px solid #e5e7eb;border-radius:14px;text-align:center;box-shadow:0 2px 12px rgba(0,0,0,.06)}
    .chal h3{font-size:.88rem;color:#7c3aed;margin-bottom:2px}
    .chal p{font-size:.73rem;color:#6b7280;line-height:1.4}
    .cw{flex:1;display:flex;align-items:center;justify-content:center;padding:80px 8px 120px}
    canvas{width:100%;max-width:500px;aspect-ratio:4/3;touch-action:none;border-radius:12px;overflow:hidden}
    .bp{position:fixed;bottom:0;left:0;right:0;z-index:10;padding:12px 16px;background:rgba(250,249,246,.97);backdrop-filter:blur(8px);border-top:1px solid #e5e5e5}
    .slider-wrap{display:flex;align-items:center;gap:12px;max-width:420px;margin:0 auto 8px}
    .slider-wrap label{font-size:.82rem;color:#374151;white-space:nowrap;min-width:70px}
    .slider{flex:1;-webkit-appearance:none;height:6px;border-radius:3px;background:linear-gradient(90deg,#ddd,#7c3aed)}
    .slider::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:#7c3aed;cursor:pointer;box-shadow:0 0 0 3px rgba(124,58,237,.2)}
    .angle-val{font-family:'SF Mono',monospace;font-size:1rem;font-weight:800;color:#7c3aed;min-width:40px;text-align:right}
    .info-grid{display:flex;gap:8px;max-width:420px;margin:0 auto}
    .info-card{flex:1;text-align:center;padding:8px;border-radius:10px;background:#f5f3ff}
    .info-card .ic-label{font-size:.68rem;color:#6b7280}
    .info-card .ic-val{font-family:'SF Mono',monospace;font-size:1.1rem;font-weight:800;margin-top:2px}
    .info-card.red .ic-val{color:#ef4444}
    .info-card.blue .ic-val{color:#3b82f6}
    .info-card.purple .ic-val{color:#7c3aed}
    .celeb{position:fixed;inset:0;z-index:30;background:rgba(0,0,0,.4);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;padding:20px}
    .celeb.show{display:flex}
    .card{background:#fff;border-radius:18px;padding:28px 24px;max-width:360px;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.12)}
    .card .em{font-size:2.8rem;margin-bottom:6px}
    .card h3{font-size:1.1rem;color:#7c3aed;margin-bottom:8px}
    .card p{font-size:.82rem;color:#4b5563;line-height:1.65;margin-bottom:14px}
    .card strong{color:#7c3aed}
    .card button{background:#7c3aed;color:#fff;font-weight:700;border:none;padding:10px 28px;border-radius:10px;cursor:pointer;font-size:.92rem}
    .dots{position:fixed;top:54px;right:12px;z-index:10;display:flex;gap:5px}
    .dot{width:6px;height:6px;border-radius:50%;background:#e5e5e5;transition:.3s}
    .dot.active{background:#7c3aed}
    .dot.done{background:#22c55e}
    .phase-trans{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:25;font-size:1.8rem;font-weight:800;color:#7c3aed;pointer-events:none;opacity:0;transition:opacity .5s;background:#fff;padding:10px 20px;border-radius:12px}
    .phase-trans.show{opacity:1}
  </style>
</head>
<body>
<div class="topbar">
  <div class="t">🪜 Cái Thang</div>
  <div class="st">Bước <span id="step">1</span>/5</div>
</div>
<div class="dots">
  <div class="dot active"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
</div>
<div class="chal"><h3 id="cht">👆 Kéo thanh góc</h3><p id="chp">Xem thang dựa vào tường — độ cao thay đổi thế nào?</p></div>
<div class="cw"><canvas id="c" width="500" height="375"></canvas></div>
<div class="bp">
  <div class="slider-wrap">
    <label>📐 Góc thang</label>
    <input type="range" class="slider" id="sl" min="10" max="80" value="60" step="1">
    <span class="angle-val" id="av">60°</span>
  </div>
  <div class="info-grid">
    <div class="info-card red"><div class="ic-label">Độ cao</div><div class="ic-val" id="iv">4.33m</div></div>
    <div class="info-card blue"><div class="ic-label">Chân thang</div><div class="ic-val" id="bv">2.50m</div></div>
    <div class="info-card purple"><div class="ic-label">Chiều dài</div><div class="ic-val">5.00m</div></div>
  </div>
</div>
<div class="celeb"><div class="card"><div class="em" id="cem">🎉</div><h3 id="cet"></h3><p id="cep"></p><button id="ceb" onclick="dismissCeleb();nextPhase()">Tiếp ▸</button></div></div>
<div class="phase-trans" id="pt"></div>

<script>
const canvas=document.getElementById('c'),c=canvas.getContext('2d');
const W=500,H=375;
canvas.width=W*devicePixelRatio;canvas.height=H*devicePixelRatio;
canvas.style.width=W+'px';canvas.style.height=H+'px';
c.scale(devicePixelRatio,devicePixelRatio);

let angle=60,phase=0;
const L=5;// ladder length = 5m
// Scale: W pixels = L * 1.2 meters
const scale=(W*0.8)/(L*1.2);// pixels per meter

const phases=[
  {t:'👆 Kéo thanh góc',p:'Xem thang dựa vào tường — độ cao thay đổi thế nào?'},
  {t:'🤔 Góc nào thang LEO CAO nhất?',p:'Thử kéo đến 10°... rồi 80°...'},
  {t:'📐 Góc 30° đặc biệt!',p:'Kéo về góc 30°. Nhìn độ cao so với chiều dài thang.'},
  {t:'🤯 AHA!',p:'Góc 30°: độ cao = CHÍNH XÁC một nửa chiều dài!'},
  {t:'📖 Sin/Cos là gì?',p:'Bí mật của cái thang chính là lượng giác!'},
];

function upUI(){
  const p=phases[phase];
  document.getElementById('cht').textContent=p.t;
  document.getElementById('chp').textContent=p.p;
  document.getElementById('step').textContent=phase+1;
  const dots=document.querySelectorAll('.dot');
  dots.forEach((d,i)=>{d.classList.remove('active','done');if(i<phase)d.classList.add('done');else if(i===phase)d.classList.add('active')});
}

document.getElementById('sl').addEventListener('input',function(){
  angle=+this.value;
  document.getElementById('av').textContent=angle+'°';
  checkDiscoveries();
  draw();
});

function checkDiscoveries(){
  const sin=Math.sin(angle*Math.PI/180);
  const cos=Math.cos(angle*Math.PI/180);
  if(phase===1&&angle>=75){
    showCel('💡','Góc càng lớn, thang càng cao!','Nhưng... tại góc 90°, thang sẽ <strong>thẳng đứng</strong> và dễ bị đổ! Người ta cần tính góc an toàn.');
  }
  if(phase===1&&angle>=80){
    showCel('💡','Góc càng lớn, thang càng cao!','Nhưng... tại góc 90°, thang sẽ bị <strong>đổ</strong>! Cần góc an toàn.\n\nBây giờ, em đến <strong>bước 2</strong> — góc 30° có gì đặc biệt?');
  }
  if(phase===2&&Math.abs(angle-30)<=3){
    showCel('🤯','Độ cao = một nửa!','Thang dài <strong>5m</strong>, góc <strong>30°</strong> → độ cao <strong>= 2.5m</strong> (chính xác ½!)\n\nTỉ lệ <strong>½</strong> này LUÔN đúng ở góc 30°, không phụ thuộc thang dài hay ngắn.\n\n<strong>sin(30°) = 0.5 = ½</strong>');
  }
}

function showCel(e,t,p){
  document.getElementById('cem').textContent=e;
  document.getElementById('cet').textContent=t;
  document.getElementById('cep').innerHTML=p.replace(/\n/g,'<br>').replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>');
  document.getElementById('celeb').classList.add('show');
}
function dismissCeleb(){document.getElementById('celeb').classList.remove('show')}

window.nextPhase=function(){
  if(phase<4){
    phase++;upUI();
    if(phase===4){
      document.getElementById('ceb').textContent='🎓 Hoàn thành!';
    }
    const pt=document.getElementById('pt');
    pt.textContent=['','Nhìn kỹ hơn...','Thử góc 30°...','🤯 Tỉ lệ đặc biệt!','📖 Bí mật lượng giác'][phase];
    pt.classList.add('show');
    setTimeout(()=>pt.classList.remove('show'),1500);
    draw();
  }
  if(phase===4){
    showCel('🎓','Sin = Độ cao ÷ Chiều dài','<strong>sin(θ)</strong> = độ cao ÷ chiều dài thang = tỉ lệ giữa chiều cao và chiều dài thang.\n\n<em>sin(30°) = 0.5 → độ cao = ½ chiều dài</em>\n<em>sin(45°) = 0.707 → độ cao = 70.7% chiều dài</em>\n<em>sin(60°) = 0.866 → độ cao = 86.6% chiều dài</em>\n\n<strong>Cos(θ)</strong> = khoảng cách chân thang ÷ chiều dài.\n\nĐó là lý do em học <strong>BẢNG GIÁ TRỊ LƯỢNG GIÁC</strong> — sin và cos chính là <strong>tỉ lệ chia</strong> cho mỗi góc!');
  }
};

function draw(){
  c.clearRect(0,0,W,H);
  const aRad=angle*Math.PI/180;
  const sin=Math.sin(aRad);
  const cos=Math.cos(aRad);
  const h=L*sin;// height
  const b=L*cos;// base

  const groundY=H*0.82;
  const wallX=W*0.15;

  // Sky
  const sky=c.createLinearGradient(0,0,0,groundY);
  sky.addColorStop(0,'#d4e5ff');sky.addColorStop(1,'#f0f4ff');
  c.fillStyle=sky;c.fillRect(0,0,W,groundY);

  // Ground
  c.fillStyle='#e8d9c1';c.fillRect(0,groundY,W,H-groundY);
  c.strokeStyle='#c4a978';c.lineWidth=2;
  c.beginPath();c.moveTo(0,groundY);c.lineTo(W,groundY);c.stroke();

  // Wall
  c.fillStyle='#d9d9d9';c.fillRect(wallX-8,groundY-250,8,250);
  c.strokeStyle='#aaa';c.lineWidth=1;
  for(let y=groundY-250;y<groundY;y+=20){
    c.beginPath();c.moveTo(wallX-8,y);c.lineTo(wallX,y);c.stroke();
  }

  // Ladder
  const tipX=wallX;
  const tipY=groundY-h*scale;
  const baseX=wallX+b*scale;
  const baseY=groundY;

  // Ladder rails
  c.strokeStyle='#d97706';c.lineWidth=4;c.lineCap='round';
  const offset=3;// spacing between rails
  const perpX=Math.sin(aRad)*offset;
  const perpY=Math.cos(aRad)*offset;
  c.beginPath();c.moveTo(baseX-perpX,baseY-perpY);c.lineTo(tipX-perpX,tipY-perpY);c.stroke();
  c.beginPath();c.moveTo(baseX+perpX,baseY+perpY);c.lineTo(tipX+perpX,tipY+perpY);c.stroke();

  // Rungs
  c.strokeStyle='rgba(217,119,6,0.5)';c.lineWidth=2;
  const rungs=7;
  for(let i=1;i<=rungs;i++){
    const f=i/(rungs+1);
    const rx=baseX+(tipX-baseX)*f;
    const ry=baseY+(tipY-baseY)*f;
    c.beginPath();
    c.moveTo(rx-perpX,ry-perpY);
    c.lineTo(rx+perpX,ry+perpY);
    c.stroke();
  }

  // Height indicator (red)
  c.setLineDash([4,3]);
  c.strokeStyle='#ef4444';c.lineWidth=2;
  c.beginPath();c.moveTo(wallX+25,groundY);c.lineTo(wallX+25,tipY+10);c.stroke();
  c.setLineDash([]);

  // Height arrow
  c.strokeStyle='#ef4444';c.lineWidth=2;
  c.beginPath();c.moveTo(wallX+25,groundY);c.lineTo(wallX+25,tipY+10);c.stroke();
  c.fillStyle='#ef4444';
  c.beginPath();c.moveTo(wallX+25,tipY+5);c.lineTo(wallX+20,tipY+15);c.lineTo(wallX+30,tipY+15);c.closePath();c.fill();

  // Base indicator (blue)
  c.setLineDash([4,3]);
  c.strokeStyle='#3b82f6';c.lineWidth=2;
  c.beginPath();c.moveTo(wallX,groundY+12);c.lineTo(baseX,groundY+12);c.stroke();
  c.setLineDash([]);

  // Base arrow
  c.fillStyle='#3b82f6';
  c.beginPath();c.moveTo(baseX-5,groundY+12);c.lineTo(baseX,groundY+7);c.lineTo(baseX,groundY+17);c.closePath();c.fill();

  // Angle arc
  c.strokeStyle='#7c3aed';c.lineWidth=2;
  c.beginPath();c.arc(wallX,groundY,30,0,-aRad,true);
  c.stroke();

  // Angle label
  c.fillStyle='#7c3aed';c.font='bold 14px sans-serif';c.textAlign='left';
  c.fillText(angle+'°',wallX+35,groundY-10);

  // Height text
  c.fillStyle='#ef4444';c.font='bold 12px sans-serif';c.textAlign='left';
  c.fillText('← '+h.toFixed(2)+'m',wallX+30,(groundY+tipY)/2);

  // Base text
  c.fillStyle='#3b82f6';c.font='bold 12px sans-serif';c.textAlign='center';
  c.fillText(b.toFixed(2)+'m →',(wallX+baseX)/2,groundY+28);

  // Person at base of ladder
  const px=baseX-15;
  c.strokeStyle='#6b7280';c.lineWidth=2;c.lineCap='round';
  c.beginPath();c.arc(px,groundY-25,7,0,Math.PI*2);c.stroke();
  c.beginPath();c.moveTo(px,groundY-18);c.lineTo(px,groundY-5);c.stroke();
  c.beginPath();c.moveTo(px,groundY-5);c.lineTo(px-6,groundY);c.stroke();
  c.beginPath();c.moveTo(px,groundY-5);c.lineTo(px+6,groundY);c.stroke();
  // Arms (holding ladder)
  c.beginPath();c.moveTo(px-3,groundY-14);c.lineTo(baseX-8,groundY-12);c.stroke();

  // Update info cards
  document.getElementById('iv').textContent=h.toFixed(2)+'m';
  document.getElementById('bv').textContent=b.toFixed(2)+'m';
}

// Keyboard support
document.addEventListener('keydown',function(e){
  if(e.key==='ArrowRight'){
    angle=Math.min(80,angle+1);
    document.getElementById('sl').value=angle;
    document.getElementById('av').textContent=angle+'°';
    checkDiscoveries();draw();e.preventDefault();
  }else if(e.key==='ArrowLeft'){
    angle=Math.max(10,angle-1);
    document.getElementById('sl').value=angle;
    document.getElementById('av').textContent=angle+'°';
    checkDiscoveries();draw();e.preventDefault();
  }
});

// INIT
upUI();
draw();
</script>
</body>
</html>
